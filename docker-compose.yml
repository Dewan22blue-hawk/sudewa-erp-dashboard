version: "3.8"

services:
  wajira-finance-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wajira-finance-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_AUTH_DOMAIN=http://202.74.75.47:3000
    networks:
      - wajira-local-net

networks:
  wajira-local-net:
    external: true
