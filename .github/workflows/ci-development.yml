name: CI Development

on:
  push:
    branches:
      - development

jobs:
  build:
    name: Pull Latest Code
    runs-on: ubuntu-latest
    steps:
      - name: Pull From Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            whoami
            pwd
            echo "========= Pull Latest Code ========="
            cd /root/docker/finance-dash
            git checkout development
            git reset --hard
            git pull origin development

  deploy:
    name: Build & Restart Next App
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Install & Build
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            whoami
            pwd
            echo "========= Install Dependencies ========="
            cd /root/docker/finance-dash
            npm ci

            echo "========= Build NextJS =========" 
            npm run build

            echo "========= Restart App ========="
            docker-compose restart